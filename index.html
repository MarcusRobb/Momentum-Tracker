  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useCallback, useEffect, useMemo, useRef } = React;

      // ‚îÄ‚îÄ‚îÄ WEBHOOK URLS ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      const WEBHOOK_TASK_EVENTS   = 'https://hook.eu2.make.com/kidul4k612np23xocc0ctpaesatdt9ha';
      const WEBHOOK_LAPS_DAILY    = 'https://hook.eu2.make.com/j7tmh8f4uwvd89elevwikplsxkbvt3hf';
      const WEBHOOK_ACCOUNTABILITY = 'https://hook.eu2.make.com/x09n46boifn4hc09p2rciry0f6h8lazq';

      // ‚îÄ‚îÄ‚îÄ HELPERS ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      const generateUUID = () => {
        if (typeof crypto !== 'undefined' && crypto.randomUUID) {
          return crypto.randomUUID();
        }
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
          const r = Math.random() * 16 | 0;
          const v = c === 'x' ? r : (r & 0x3 | 0x8);
          return v.toString(16);
        });
      };

      const getWeekNumber = (date) => {
        const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const dayNum = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      };

      const fireWebhook = (url, payload) => {
        fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }).catch(err => console.warn('Make webhook failed:', err));
      };

      // ‚îÄ‚îÄ‚îÄ useLocalStorage ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      const useLocalStorage = (key, initialValue) => {
        const [storedValue, setStoredValue] = useState(() => {
          if (typeof window === 'undefined') return initialValue;
          try {
            const item = window.localStorage.getItem(key);
            return item ? JSON.parse(item) : initialValue;
          } catch (error) {
            console.error(error);
            return initialValue;
          }
        });

        const setValue = (value) => {
          try {
            const valueToStore = value instanceof Function ? value(storedValue) : value;
            setStoredValue(valueToStore);
            if (typeof window !== 'undefined') {
              window.localStorage.setItem(key, JSON.stringify(valueToStore));
            }
          } catch (error) {
            console.error(error);
          }
        };

        useEffect(() => {
          const handleStorageChange = (e) => {
            if (e.key === key && e.newValue) setStoredValue(JSON.parse(e.newValue));
          };
          window.addEventListener('storage', handleStorageChange);
          return () => window.removeEventListener('storage', handleStorageChange);
        }, [key]);

        return [storedValue, setValue];
      };

      // ‚îÄ‚îÄ‚îÄ ICONS ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      const PlusIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>);
      const TrashIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>);
      const ArrowUpCircleIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="16 12 12 8 8 12"></polyline><line x1="12" y1="16" x2="12" y2="8"></line></svg>);
      const ArrowDownCircleIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="8 12 12 16 16 12"></polyline><line x1="12" y1="8" x2="12" y2="16"></line></svg>);
      const ChevronDownIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"></polyline></svg>);
      const ChevronUpIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="18 15 12 9 6 15"></polyline></svg>);
      const DollarSignIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>);
      const CalendarIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>);
      const RestoreIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 14l-4-4 4-4"></path><path d="M5 10h11a4 4 0 0 1 4 4v1"></path></svg>);
      const LightbulbIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 18h6"></path><path d="M10 22h4"></path><path d="M12 2a7 7 0 0 0-7 7c0 3.03 1.09 5.4 2.78 6.88L12 22l4.22-6.12C17.91 14.4 19 11.03 19 9a7 7 0 0 0-7-7z"></path></svg>);
      const SparkleIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2L9.1 8.26 3 9.27l4.55 4.34L6.2 20 12 16.54 17.8 20l-1.35-6.39L21 9.27l-6.1-1.01L12 2z"></path><path d="M5 3v4"></path><path d="M19 17v4"></path><path d="M3 5h4"></path><path d="M17 19h4"></path></svg>);
      const XIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>);
      const EditIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>);
      const ClipboardCopyIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>);
      const DownloadIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>);
      const UploadIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>);

      // ‚îÄ‚îÄ‚îÄ CSV EXPORT UTILITIES ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      const downloadCSV = (data, filename) => {
        const blob = new Blob([data], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', filename);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const arrayToCSV = (array) => {
        if (!array || array.length === 0) return '';
        const headers = Object.keys(array[0]);
        const csvHeaders = headers.join(',');
        const csvRows = array.map(row =>
          headers.map(header => {
            const value = row[header];
            if (typeof value === 'string' && (value.includes(',') || value.includes('"') || value.includes('\n'))) {
              return `"${value.replace(/"/g, '""')}"`;
            }
            return value;
          }).join(',')
        );
        return [csvHeaders, ...csvRows].join('\n');
      };

      const exportLapsData = (lapsHistory) => {
        if (!lapsHistory || lapsHistory.length === 0) { alert('No LAPS data to export'); return; }
        const csvData = arrayToCSV(lapsHistory);
        downloadCSV(csvData, `laps-data-${new Date().toISOString().split('T')[0]}.csv`);
      };

      const exportAccountabilityData = (accountabilityHistory) => {
        if (!accountabilityHistory || accountabilityHistory.length === 0) { alert('No accountability data to export'); return; }
        const csvData = arrayToCSV(accountabilityHistory);
        downloadCSV(csvData, `accountability-data-${new Date().toISOString().split('T')[0]}.csv`);
      };

      const exportCompletedTasks = (completedHistory) => {
        if (!completedHistory || completedHistory.length === 0) { alert('No completed tasks to export'); return; }
        const tasksForExport = completedHistory.map(task => ({
          task: task.text, completed_date: new Date(task.completedAt).toLocaleDateString(),
          completed_time: new Date(task.completedAt).toLocaleTimeString(),
          was_income_generating: task.isIncomeGenerating ? 'Yes' : 'No',
          notes: task.notes || '', scheduled_time: task.scheduledTime || '', duration_minutes: task.duration || ''
        }));
        downloadCSV(arrayToCSV(tasksForExport), `completed-tasks-${new Date().toISOString().split('T')[0]}.csv`);
      };

      const exportUncompletedTasks = (brainDump, topThree, nonNegotiableTasks, ideasVault) => {
        const timestamp = new Date().toISOString().split('T')[0];
        const uncompletedBrainDump = brainDump.filter(task => !task.isCompleted);
        const uncompletedTopThree = topThree.filter(task => !task.isCompleted);
        const uncompletedNonNegotiables = nonNegotiableTasks.filter(task => !task.isCompleted);
        const totalUncompleted = uncompletedBrainDump.length + uncompletedTopThree.length + uncompletedNonNegotiables.length + ideasVault.length;
        if (totalUncompleted === 0) { alert('No uncompleted tasks to export'); return; }
        let csvContent = '=== UNCOMPLETED TASKS EXPORT ===\n\n';
        if (uncompletedTopThree.length > 0) {
          csvContent += '=== TOP 3 PRIORITIES (UNCOMPLETED) ===\n';
          csvContent += arrayToCSV(uncompletedTopThree.map(task => ({ section: 'Top 3 Priorities', task: task.text, description: task.description || '', scheduled_time: task.scheduledTime || '', duration_minutes: task.duration || '', is_income_generating: task.isIncomeGenerating ? 'Yes' : 'No', action_notes: task.notes || '' }))) + '\n\n';
        }
        if (uncompletedBrainDump.length > 0) {
          csvContent += '=== BRAIN DUMP (UNCOMPLETED) ===\n';
          csvContent += arrayToCSV(uncompletedBrainDump.map(task => ({ section: 'Brain Dump', task: task.text, description: task.description || '', scheduled_time: task.scheduledTime || '', duration_minutes: task.duration || '', is_income_generating: task.isIncomeGenerating ? 'Yes' : 'No', action_notes: task.notes || '' }))) + '\n\n';
        }
        downloadCSV(csvContent, `uncompleted-tasks-${timestamp}.csv`);
      };

      const exportAllData = (lapsHistory, accountabilityHistory, completedHistory, brainDump, topThree, ideasVault) => {
        const timestamp = new Date().toISOString().split('T')[0];
        let csvContent = '=== MOMENTUM TRACKER DATA EXPORT ===\n\n';
        if (lapsHistory.length > 0) { csvContent += '=== LAPS DATA ===\n'; csvContent += arrayToCSV(lapsHistory) + '\n\n'; }
        if (completedHistory.length > 0) {
          csvContent += '=== COMPLETED TASKS ===\n';
          csvContent += arrayToCSV(completedHistory.map(task => ({ task: task.text, completed_date: new Date(task.completedAt).toLocaleDateString(), was_income_generating: task.isIncomeGenerating ? 'Yes' : 'No', notes: task.notes || '' }))) + '\n\n';
        }
        downloadCSV(csvContent, `momentum-tracker-full-export-${timestamp}.csv`);
      };

      // ‚îÄ‚îÄ‚îÄ GEMINI MODAL ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      const GeminiModal = ({ task, onClose }) => {
        const [prompt, setPrompt] = useState('');
        const [response, setResponse] = useState('');
        const [isLoading, setIsLoading] = useState(false);
        const [error, setError] = useState('');
        const [copySuccess, setCopySuccess] = useState('');
        const modalRef = useRef(null);
        const responseRef = useRef(null);

        useEffect(() => {
          const handleEsc = (event) => { if (event.key === 'Escape') onClose(); };
          window.addEventListener('keydown', handleEsc);
          const focusableElements = modalRef.current?.querySelectorAll('button, textarea');
          focusableElements?.[0]?.focus();
          return () => window.removeEventListener('keydown', handleEsc);
        }, [onClose]);

        const handleSubmit = async (e) => {
          e.preventDefault();
          if (!prompt.trim() || isLoading) return;
          setIsLoading(true); setError(''); setResponse(''); setCopySuccess('');
          try {
            const res = await fetch('/api/gemini', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ task: { id: task.id, text: task.text, notes: task.notes || '', isIncomeGenerating: task.isIncomeGenerating || false }, prompt: prompt.trim() }),
            });
            if (!res.ok) { const errorData = await res.json().catch(() => ({})); throw new Error(errorData.error || `Request failed with status ${res.status}`); }
            const data = await res.json();
            setResponse(data.response);
          } catch (err) {
            if (err.message.includes('404')) setError('AI service not configured.');
            else if (err.message.includes('500')) setError('Server error. Check API configuration.');
            else if (err.message.includes('Failed to fetch')) setError('Network error.');
            else setError(err.message || 'Failed to get a response from the AI.');
          } finally {
            setIsLoading(false);
            setTimeout(() => { responseRef.current?.scrollTo({ top: responseRef.current.scrollHeight, behavior: 'smooth' }); }, 100);
          }
        };

        const handleCopyResponse = async () => {
          try { await navigator.clipboard.writeText(response); setCopySuccess('Copied!'); setTimeout(() => setCopySuccess(''), 2000); }
          catch (err) { console.error('Failed to copy text: ', err); }
        };

        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-60 backdrop-blur-sm" role="dialog" aria-modal="true" onClick={onClose}>
            <div ref={modalRef} className="bg-white rounded-xl shadow-2xl w-full max-w-2xl h-[90vh] max-h-[700px] flex flex-col" onClick={e => e.stopPropagation()}>
              <header className="flex items-center justify-between p-4 border-b border-slate-200 flex-shrink-0">
                <div className="flex items-center gap-3">
                  <SparkleIcon className="w-6 h-6 text-blue-500" />
                  <div><h2 className="text-lg font-semibold text-slate-800">AI Assistant</h2><p className="text-sm text-slate-500">Working on: {task.text}</p></div>
                </div>
                <button onClick={onClose} className="p-2 rounded-md text-slate-400 hover:text-slate-600 hover:bg-slate-100"><XIcon className="w-5 h-5" /></button>
              </header>
              <main ref={responseRef} className="flex-1 p-6 overflow-y-auto">
                {!response && !isLoading && !error && (<div className="text-center text-slate-400 py-16"><p className="text-lg">What do you need help with?</p><p className="text-sm mt-1">e.g., "Brainstorm 5 marketing angles..."</p></div>)}
                {isLoading && (<div className="flex items-center justify-center gap-3 text-slate-600"><div className="animate-spin rounded-full h-5 w-5 border-b-2 border-blue-500"></div><span>Thinking...</span></div>)}
                {error && (<div className="bg-red-50 border-l-4 border-red-400 p-4 rounded-r-lg"><p className="font-bold text-red-800">Error</p><p className="text-red-700">{error}</p></div>)}
                {response && (<div className="prose prose-slate max-w-none relative"><button onClick={handleCopyResponse} className="absolute top-0 right-0 -mt-2 -mr-2 p-2 text-sm rounded-md bg-slate-100 text-slate-600 hover:bg-slate-200 flex items-center gap-1.5">{copySuccess ? <>{copySuccess}</> : <><ClipboardCopyIcon className="w-4 h-4" /> Copy</>}</button><pre className="whitespace-pre-wrap font-sans bg-slate-50 p-4 rounded-lg text-slate-800">{response}</pre></div>)}
              </main>
              <footer className="p-4 border-t border-slate-200 flex-shrink-0">
                <form onSubmit={handleSubmit} className="flex gap-3">
                  <textarea value={prompt} onChange={(e) => setPrompt(e.target.value)} placeholder="Ask for help with this task..." className="flex-1 resize-none rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm p-3" rows="2" disabled={isLoading} />
                  <button type="submit" disabled={!prompt.trim() || isLoading} className="px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                    <SparkleIcon className="w-4 h-4" />{isLoading ? 'Thinking...' : 'Ask AI'}
                  </button>
                </form>
              </footer>
            </div>
          </div>
        );
      };

      // ‚îÄ‚îÄ‚îÄ ACCOUNTABILITY TRACKER ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      const AccountabilityTracker = ({ accountabilityHistory, setAccountabilityHistory }) => {
        const [weekOffset, setWeekOffset] = useState(0);

        const getWeekDates = (weekOffset = 0) => {
          const weekDates = [];
          const today = new Date();
          today.setDate(today.getDate() + weekOffset * 7);
          const currentDay = today.getDay();
          const diff = today.getDate() - currentDay + (currentDay === 0 ? -6 : 1);
          const monday = new Date(today.setDate(diff));
          for (let i = 0; i < 5; i++) {
            const day = new Date(monday);
            day.setDate(monday.getDate() + i);
            weekDates.push(day);
          }
          return weekDates;
        };

        const toISODateString = (date) => date.toISOString().split('T')[0];
        const toFriendlyDate = (date) => date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const weekDates = getWeekDates(weekOffset);
        const weekDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
        const activities = ['appointment', 'spokeToPerson', 'taughtSomeone', 'madeOffer'];
        const activityLabels = { appointment: 'Appointment Y/N', spokeToPerson: 'Spoke to 1 person Y/N', taughtSomeone: 'Taught Someone Y/N', madeOffer: 'Made an offer Y/N' };

        const handleCheckboxChange = (date, activity, checked) => {
          setAccountabilityHistory(prevHistory => {
            const entryIndex = prevHistory.findIndex(e => e.date === date);
            let updatedEntry;
            if (entryIndex > -1) {
              const newHistory = [...prevHistory];
              newHistory[entryIndex] = { ...newHistory[entryIndex], [activity]: checked };
              updatedEntry = newHistory[entryIndex];
              // ‚îÄ‚îÄ‚îÄ WEBHOOK: Accountability tick ‚îÄ‚îÄ‚îÄ
              fireWebhook(WEBHOOK_ACCOUNTABILITY, {
                date,
                day_of_week: new Date(date).toLocaleDateString('en-AU', { weekday: 'long' }),
                week_starting: weekDates[0].toISOString().split('T')[0],
                appointment: updatedEntry.appointment || false,
                spoke_to_person: updatedEntry.spokeToPerson || false,
                taught_someone: updatedEntry.taughtSomeone || false,
                made_offer: updatedEntry.madeOffer || false,
                week_finalized: false
              });
              return newHistory;
            } else {
              updatedEntry = { date, appointment: false, spokeToPerson: false, taughtSomeone: false, madeOffer: false, [activity]: checked };
              // ‚îÄ‚îÄ‚îÄ WEBHOOK: Accountability tick ‚îÄ‚îÄ‚îÄ
              fireWebhook(WEBHOOK_ACCOUNTABILITY, {
                date,
                day_of_week: new Date(date).toLocaleDateString('en-AU', { weekday: 'long' }),
                week_starting: weekDates[0].toISOString().split('T')[0],
                appointment: updatedEntry.appointment || false,
                spoke_to_person: updatedEntry.spokeToPerson || false,
                taught_someone: updatedEntry.taughtSomeone || false,
                made_offer: updatedEntry.madeOffer || false,
                week_finalized: false
              });
              return [...prevHistory, updatedEntry];
            }
          });
        };

        const weekData = weekDates.map(date => {
          const dateStr = toISODateString(date);
          return accountabilityHistory.find(entry => entry.date === dateStr) || { date: dateStr, appointment: false, spokeToPerson: false, taughtSomeone: false, madeOffer: false };
        });

        const totals = activities.reduce((acc, activity) => { acc[activity] = weekData.filter(day => day[activity]).length; return acc; }, {});
        const weekRange = `Week of ${toFriendlyDate(weekDates[0])} - ${toFriendlyDate(weekDates[4])}`;

        const handleFinalizeWeek = () => {
          if (window.confirm(`Finalize the week of ${weekRange}?`)) {
            const finalizedWeeks = JSON.parse(localStorage.getItem('finalized-weeks') || '[]');
            const weekKey = `${weekDates[0].getFullYear()}-W${Math.ceil(weekDates[0].getDate() / 7)}`;
            if (!finalizedWeeks.includes(weekKey)) { finalizedWeeks.push(weekKey); localStorage.setItem('finalized-weeks', JSON.stringify(finalizedWeeks)); }
            alert(`Week finalized! Data for ${weekRange} has been saved.`);
          }
        };

        const isCurrentWeek = weekOffset === 0;
        const finalizedWeeks = JSON.parse(localStorage.getItem('finalized-weeks') || '[]');
        const weekKey = `${weekDates[0].getFullYear()}-W${Math.ceil(weekDates[0].getDate() / 7)}`;
        const isWeekFinalized = finalizedWeeks.includes(weekKey);

        return (
          <div className="bg-white p-6 rounded-lg shadow-md">
            <div className="flex justify-between items-center mb-4">
              <div>
                <h2 className="text-2xl font-bold text-slate-800">Accountability Process</h2>
                <p className="text-sm text-slate-500">{weekRange}</p>
                {isWeekFinalized && <p className="text-sm text-green-600 font-medium">‚úÖ Week Finalized</p>}
              </div>
              <div className="flex gap-2">
                <button onClick={() => setWeekOffset(weekOffset - 1)} className="px-3 py-1 text-sm font-medium text-slate-700 bg-slate-100 rounded-md hover:bg-slate-200">‚Üê Previous Week</button>
                <button onClick={() => setWeekOffset(weekOffset + 1)} disabled={weekOffset >= 0} className="px-3 py-1 text-sm font-medium text-slate-700 bg-slate-100 rounded-md hover:bg-slate-200 disabled:opacity-50">Next Week ‚Üí</button>
                {accountabilityHistory.length > 0 && <button onClick={() => exportAccountabilityData(accountabilityHistory)} className="px-3 py-1 text-sm font-medium text-blue-600 bg-blue-50 rounded-md hover:bg-blue-100"><DownloadIcon className="w-4 h-4 inline mr-1" />Export</button>}
                {isCurrentWeek && !isWeekFinalized && <button onClick={handleFinalizeWeek} className="px-4 py-1 text-sm font-medium text-white bg-green-600 rounded-md hover:bg-green-700">Finalize Week</button>}
              </div>
            </div>
            <div className="overflow-x-auto">
              <table className="min-w-full border border-slate-300 text-sm">
                <thead className="bg-blue-500 text-white">
                  <tr>
                    <th className="p-3 text-left font-semibold border-r border-blue-400">Activity</th>
                    {activities.map(activity => (<th key={activity} className="p-3 text-center font-semibold border-r border-blue-400 last:border-r-0">{activityLabels[activity]}</th>))}
                  </tr>
                </thead>
                <tbody>
                  {weekDays.map((day, index) => {
                    const dateStr = toISODateString(weekDates[index]);
                    const dayData = weekData[index];
                    return (
                      <tr key={day} className="border-b border-slate-200">
                        <td className="p-3 font-medium bg-slate-100 border-r border-slate-300 text-slate-900">{day}</td>
                        {activities.map(activity => (
                          <td key={activity} className="p-3 text-center border-r border-slate-300">
                            <input type="checkbox" className="h-5 w-5 rounded border-gray-400 text-blue-600 focus:ring-blue-500 cursor-pointer" checked={!!dayData[activity]} onChange={e => handleCheckboxChange(dateStr, activity, e.target.checked)} />
                          </td>
                        ))}
                      </tr>
                    );
                  })}
                  <tr className="bg-blue-500 text-white font-bold">
                    <td className="p-3 border-r border-blue-400">Total</td>
                    {activities.map(activity => (<td key={activity} className="p-3 text-center border-r border-blue-400 last:border-r-0">{totals[activity]}</td>))}
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      // ‚îÄ‚îÄ‚îÄ REPORTS ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      const Reports = ({ lapsHistory, accountabilityHistory }) => {
        const getWeeklyLaps = () => {
          const today = new Date();
          const dayOfWeek = today.getDay();
          const startOfWeek = new Date(today);
          startOfWeek.setDate(today.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1));
          const startOfWeekStr = startOfWeek.toISOString().split('T')[0];
          const todayStr = today.toISOString().split('T')[0];
          return lapsHistory.filter(d => d.date >= startOfWeekStr && d.date <= todayStr).reduce((acc, curr) => ({ leads: acc.leads + curr.leads, appointments: acc.appointments + curr.appointments, presentations: acc.presentations + curr.presentations, sales: acc.sales + curr.sales }), { leads: 0, appointments: 0, presentations: 0, sales: 0 });
        };
        const weeklyLaps = getWeeklyLaps();
        const leadToApptRate = weeklyLaps.leads > 0 ? ((weeklyLaps.appointments / weeklyLaps.leads) * 100).toFixed(1) : '0.0';
        const apptToPresRate = weeklyLaps.appointments > 0 ? ((weeklyLaps.presentations / weeklyLaps.appointments) * 100).toFixed(1) : '0.0';
        const presToSaleRate = weeklyLaps.presentations > 0 ? ((weeklyLaps.sales / weeklyLaps.presentations) * 100).toFixed(1) : '0.0';

        const getHeatmapData = () => {
          const today = new Date();
          const year = today.getFullYear(); const month = today.getMonth();
          const daysInMonth = new Date(year, month + 1, 0).getDate();
          const firstDayOfMonth = new Date(year, month, 1).getDay();
          const offset = (firstDayOfMonth === 0) ? 6 : firstDayOfMonth - 1;
          const heatmap = Array(offset).fill(null);
          for (let i = 1; i <= daysInMonth; i++) {
            const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${i.toString().padStart(2, '0')}`;
            const entry = accountabilityHistory.find(d => d.date === dateStr);
            heatmap.push(entry ? { date: i, score: Object.values(entry).filter(v => v === true).length } : { date: i, score: 0 });
          }
          return heatmap;
        };
        const heatmapData = getHeatmapData();
        const getColorForScore = (score) => { if (score >= 4) return 'bg-green-600'; if (score === 3) return 'bg-green-500'; if (score === 2) return 'bg-yellow-400'; if (score === 1) return 'bg-yellow-300'; return 'bg-slate-200'; };

        return (
          <div className="space-y-12">
            <section>
              <h3 className="text-xl font-bold text-slate-800 mb-4">This Week's LAPS Conversion Funnel</h3>
              <div className="flex flex-col md:flex-row items-center justify-around gap-2 text-center flex-wrap">
                <div className="p-4 rounded-lg bg-slate-100 min-w-[100px]"><p className="text-sm text-slate-500">Leads</p><p className="text-3xl font-bold">{weeklyLaps.leads}</p></div>
                <div className="flex flex-col items-center"><div className="text-2xl font-semibold text-slate-400">‚Üí</div><p className="text-lg font-bold text-blue-600">{leadToApptRate}%</p><p className="text-xs text-slate-500 -mt-1">conversion</p></div>
                <div className="p-4 rounded-lg bg-slate-100 min-w-[100px]"><p className="text-sm text-slate-500">Appointments</p><p className="text-3xl font-bold">{weeklyLaps.appointments}</p></div>
                <div className="flex flex-col items-center"><div className="text-2xl font-semibold text-slate-400">‚Üí</div><p className="text-lg font-bold text-blue-600">{apptToPresRate}%</p><p className="text-xs text-slate-500 -mt-1">conversion</p></div>
                <div className="p-4 rounded-lg bg-slate-100 min-w-[100px]"><p className="text-sm text-slate-500">Presentations</p><p className="text-3xl font-bold">{weeklyLaps.presentations}</p></div>
                <div className="flex flex-col items-center"><div className="text-2xl font-semibold text-slate-400">‚Üí</div><p className="text-lg font-bold text-blue-600">{presToSaleRate}%</p><p className="text-xs text-slate-500 -mt-1">conversion</p></div>
                <div className="p-4 rounded-lg bg-slate-100 min-w-[100px]"><p className="text-sm text-slate-500">Sales</p><p className="text-3xl font-bold">{weeklyLaps.sales}</p></div>
              </div>
            </section>
            <section>
              <h3 className="text-xl font-bold text-slate-800 mb-4">This Month's Accountability Heatmap</h3>
              <div className="grid grid-cols-7 gap-1 text-center text-xs font-semibold text-slate-500 mb-2"><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span></div>
              <div className="grid grid-cols-7 gap-1">
                {heatmapData.map((day, index) => (day ? (<div key={index} title={`${day.score} activities on day ${day.date}`} className={`w-full aspect-square rounded ${getColorForScore(day.score)} flex items-center justify-center text-white font-bold`}>{day.date}</div>) : (<div key={index}></div>)))}
              </div>
            </section>
          </div>
        );
      };

      // ‚îÄ‚îÄ‚îÄ LAPS TRACKER ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      const LapsTracker = ({ lapsHistory, setLapsHistory }) => {
        const todayStr = new Date().toISOString().split('T')[0];
        const todayData = useMemo(() => lapsHistory.find(d => d.date === todayStr) || { date: todayStr, leads: 0, appointments: 0, presentations: 0, sales: 0 }, [lapsHistory, todayStr]);
        const [currentLaps, setCurrentLaps] = useState(todayData);
        const [showHistory, setShowHistory] = useState(false);
        const [saveStatus, setSaveStatus] = useState('idle');

        useEffect(() => { setCurrentLaps(todayData); }, [todayData]);

        const handleInputChange = (e) => {
          const { name, value } = e.target;
          setCurrentLaps(prev => ({ ...prev, [name]: Number(value) < 0 ? 0 : Number(value) }));
          setSaveStatus('idle');
        };

        const handleSave = () => {
          setSaveStatus('saving');
          setLapsHistory(prevHistory => {
            const existingIndex = prevHistory.findIndex(d => d.date === todayStr);
            if (existingIndex > -1) { const newHistory = [...prevHistory]; newHistory[existingIndex] = { ...currentLaps, date: todayStr }; return newHistory; }
            else return [...prevHistory, { ...currentLaps, date: todayStr }];
          });
          // ‚îÄ‚îÄ‚îÄ WEBHOOK: LAPS Save ‚îÄ‚îÄ‚îÄ
          fireWebhook(WEBHOOK_LAPS_DAILY, {
            date: todayStr,
            leads: currentLaps.leads,
            appointments: currentLaps.appointments,
            presentations: currentLaps.presentations,
            sales: currentLaps.sales,
            lead_to_appt_pct: currentLaps.leads > 0 ? ((currentLaps.appointments / currentLaps.leads) * 100).toFixed(1) : '0.0',
            appt_to_pres_pct: currentLaps.appointments > 0 ? ((currentLaps.presentations / currentLaps.appointments) * 100).toFixed(1) : '0.0',
            pres_to_sale_pct: currentLaps.presentations > 0 ? ((currentLaps.sales / currentLaps.presentations) * 100).toFixed(1) : '0.0',
            week_number: getWeekNumber(new Date()),
            month: new Date().toLocaleString('default', { month: 'long' })
          });
          setTimeout(() => setSaveStatus('saved'), 300);
          setTimeout(() => setSaveStatus('idle'), 2500);
        };

        const getWeeklyTotal = () => {
          const today = new Date(); const dayOfWeek = today.getDay();
          const startOfWeek = new Date(today); startOfWeek.setDate(today.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1));
          return lapsHistory.filter(d => d.date >= startOfWeek.toISOString().split('T')[0] && d.date <= todayStr).reduce((acc, curr) => ({ leads: acc.leads + curr.leads, appointments: acc.appointments + curr.appointments, presentations: acc.presentations + curr.presentations, sales: acc.sales + curr.sales }), { leads: 0, appointments: 0, presentations: 0, sales: 0 });
        };
        const getMonthlyTotal = () => {
          const today = new Date(); const startOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
          return lapsHistory.filter(d => d.date >= startOfMonth.toISOString().split('T')[0] && d.date <= todayStr).reduce((acc, curr) => ({ leads: acc.leads + curr.leads, appointments: acc.appointments + curr.appointments, presentations: acc.presentations + curr.presentations, sales: acc.sales + curr.sales }), { leads: 0, appointments: 0, presentations: 0, sales: 0 });
        };
        const weeklyTotal = getWeeklyTotal(); const monthlyTotal = getMonthlyTotal();

        return (
          <div className="bg-white p-6 rounded-lg shadow-md">
            <h2 className="text-2xl font-bold text-slate-800 mb-4">üìä LAPS Tracker</h2>
            <div className="mb-6">
              <h3 className="text-lg font-semibold text-slate-700 mb-3">Today's Laps ({todayStr})</h3>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                {['leads', 'appointments', 'presentations', 'sales'].map(key => (
                  <div key={key}><label htmlFor={key} className="block text-sm font-medium text-slate-600 capitalize">{key}</label><input type="number" name={key} id={key} value={currentLaps[key]} onChange={handleInputChange} className="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2" min="0" /></div>
                ))}
              </div>
              <button onClick={handleSave} className={`px-4 py-2 rounded-md font-medium transition-colors ${saveStatus === 'saved' ? 'bg-green-500 text-white' : saveStatus === 'saving' ? 'bg-blue-400 text-white' : 'bg-blue-500 text-white hover:bg-blue-600'}`} disabled={saveStatus === 'saving'}>
                {saveStatus === 'saved' ? '‚úì Saved!' : saveStatus === 'saving' ? 'Saving...' : "Save Today's LAPS"}
              </button>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
              <div><h4 className="font-semibold text-slate-700 mb-2">This Week's Total</h4><div className="grid grid-cols-2 gap-2 text-sm"><div className="bg-slate-50 p-2 rounded">Leads: <span className="font-bold">{weeklyTotal.leads}</span></div><div className="bg-slate-50 p-2 rounded">Appointments: <span className="font-bold">{weeklyTotal.appointments}</span></div><div className="bg-slate-50 p-2 rounded">Presentations: <span className="font-bold">{weeklyTotal.presentations}</span></div><div className="bg-slate-50 p-2 rounded">Sales: <span className="font-bold">{weeklyTotal.sales}</span></div></div></div>
              <div><h4 className="font-semibold text-slate-700 mb-2">This Month's Total</h4><div className="grid grid-cols-2 gap-2 text-sm"><div className="bg-slate-50 p-2 rounded">Leads: <span className="font-bold">{monthlyTotal.leads}</span></div><div className="bg-slate-50 p-2 rounded">Appointments: <span className="font-bold">{monthlyTotal.appointments}</span></div><div className="bg-slate-50 p-2 rounded">Presentations: <span className="font-bold">{monthlyTotal.presentations}</span></div><div className="bg-slate-50 p-2 rounded">Sales: <span className="font-bold">{monthlyTotal.sales}</span></div></div></div>
            </div>
            <div>
              <div className="flex justify-between items-center mb-4">
                <button onClick={() => setShowHistory(!showHistory)} className="flex items-center text-left text-lg font-semibold text-slate-700 focus:outline-none">
                  <span>LAPS History ({lapsHistory.length} days)</span><ChevronDownIcon className={`w-5 h-5 ml-2 transform transition-transform ${showHistory ? 'rotate-180' : ''}`} />
                </button>
                {lapsHistory.length > 0 && <button onClick={() => exportLapsData(lapsHistory)} className="flex items-center gap-2 px-3 py-1 text-sm font-medium text-blue-600 bg-blue-50 rounded-md hover:bg-blue-100"><DownloadIcon className="w-4 h-4" />Export CSV</button>}
              </div>
              {showHistory && (
                <div className="overflow-x-auto rounded-lg border border-slate-200">
                  <table className="min-w-full divide-y divide-slate-200">
                    <thead className="bg-slate-50"><tr><th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">Date</th><th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">Leads</th><th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">Appointments</th><th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">Presentations</th><th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">Sales</th></tr></thead>
                    <tbody className="bg-white divide-y divide-slate-200">{lapsHistory.slice().reverse().map(day => (<tr key={day.date}><td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-900">{new Date(day.date).toLocaleDateString()}</td><td className="px-6 py-4 whitespace-nowrap text-sm text-slate-500">{day.leads}</td><td className="px-6 py-4 whitespace-nowrap text-sm text-slate-500">{day.appointments}</td><td className="px-6 py-4 whitespace-nowrap text-sm text-slate-500">{day.presentations}</td><td className="px-6 py-4 whitespace-nowrap text-sm text-slate-500">{day.sales}</td></tr>))}</tbody>
                  </table>
                </div>
              )}
            </div>
          </div>
        );
      };

      // ‚îÄ‚îÄ‚îÄ INSTRUCTIONS ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      const Instructions = () => {
        const [isOpen, setIsOpen] = useState(false);
        return (
          <div className="bg-white rounded-lg shadow-sm mb-8">
            <button onClick={() => setIsOpen(!isOpen)} className="w-full flex justify-between items-center p-4 text-left text-lg font-semibold text-slate-700 focus:outline-none">
              <span>Time Boxing Instructions & Tips</span><ChevronDownIcon className={`w-6 h-6 transform transition-transform ${isOpen ? 'rotate-180' : ''}`} />
            </button>
            {isOpen && (
              <div className="p-6 border-t border-slate-200 text-slate-700">
                <ol className="list-decimal list-outside pl-5 space-y-3 mb-6">
                  <li><strong>Brain Dump Everything:</strong> Jot down all tasks running through your head. Fresh every day.</li>
                  <li><strong>Select Your Top Three:</strong> Circle just three items. One MUST be income-generating.</li>
                  <li><strong>Schedule These Three:</strong> Book specific times in your calendar.</li>
                  <li><strong>Detail Action Points:</strong> Bullet-point the specific actions required for each.</li>
                  <li><strong>Execute Your Plan:</strong> Show up and get it done. You learn by doing.</li>
                </ol>
              </div>
            )}
          </div>
        );
      };

      // ‚îÄ‚îÄ‚îÄ 12-HOUR TIME PICKER ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      const TimePicker12Hour = ({ value, onChange, className }) => {
        const convertTo12Hour = (time24) => {
          if (!time24) return { hour: '', minute: '', period: 'AM' };
          const [hours, minutes] = time24.split(':');
          const hour24 = parseInt(hours);
          return { hour: (hour24 === 0 ? 12 : hour24 > 12 ? hour24 - 12 : hour24).toString(), minute: minutes, period: hour24 >= 12 ? 'PM' : 'AM' };
        };
        const convertTo24Hour = (hour, minute, period) => {
          if (!hour || !minute) return '';
          let hour24 = parseInt(hour);
          if (period === 'AM' && hour24 === 12) hour24 = 0;
          else if (period === 'PM' && hour24 !== 12) hour24 += 12;
          return `${hour24.toString().padStart(2, '0')}:${minute}`;
        };
        const [timeData, setTimeData] = useState(() => convertTo12Hour(value));
        useEffect(() => { setTimeData(convertTo12Hour(value)); }, [value]);
        const handleTimeChange = (field, newValue) => {
          const updatedTime = { ...timeData, [field]: newValue };
          setTimeData(updatedTime);
          if (updatedTime.hour && updatedTime.minute) { const time24 = convertTo24Hour(updatedTime.hour, updatedTime.minute, updatedTime.period); if (time24) onChange(time24); }
        };
        return (
          <div className={`flex items-center gap-1 ${className}`}>
            <select value={timeData.hour} onChange={(e) => handleTimeChange('hour', e.target.value)} className="block w-16 text-sm p-2 rounded-md border-slate-300 focus:ring-blue-500 focus:border-blue-500">
              <option value="">Hr</option>{Array.from({ length: 12 }, (_, i) => i + 1).map(hour => (<option key={hour} value={hour}>{hour}</option>))}
            </select>
            <span className="text-slate-500">:</span>
            <select value={timeData.minute} onChange={(e) => handleTimeChange('minute', e.target.value)} className="block w-16 text-sm p-2 rounded-md border-slate-300 focus:ring-blue-500 focus:border-blue-500">
              <option value="">Min</option>{Array.from({ length: 60 }, (_, i) => i.toString().padStart(2, '0')).map(minute => (<option key={minute} value={minute}>{minute}</option>))}
            </select>
            <select value={timeData.period} onChange={(e) => handleTimeChange('period', e.target.value)} className="block w-16 text-sm p-2 rounded-md border-slate-300 focus:ring-blue-500 focus:border-blue-500">
              <option value="AM">AM</option><option value="PM">PM</option>
            </select>
          </div>
        );
      };

      // ‚îÄ‚îÄ‚îÄ TASK CARD ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      const TaskCard = ({ task, onUpdate, onDelete, onPromote, onDemote, onSendToVault, onLaunchGemini, isTopThree }) => {
        const [isEditingTitle, setIsEditingTitle] = useState(false);
        const [isEditingDescription, setIsEditingDescription] = useState(false);
        const [showDescription, setShowDescription] = useState(false);
        const [tempTitle, setTempTitle] = useState(task.text);
        const [tempDescription, setTempDescription] = useState(task.description || '');

        const handleToggle = (field, value) => onUpdate({ ...task, [field]: value });

        const handleTitleEdit = () => {
          if (isEditingTitle) { if (tempTitle.trim()) onUpdate({ ...task, text: tempTitle.trim() }); else setTempTitle(task.text); setIsEditingTitle(false); }
          else { setTempTitle(task.text); setIsEditingTitle(true); }
        };

        const handleDescriptionEdit = () => {
          if (isEditingDescription) { onUpdate({ ...task, description: tempDescription }); setIsEditingDescription(false); }
          else { setTempDescription(task.description || ''); setIsEditingDescription(true); setShowDescription(true); }
        };

        const handleAddToCalendar = () => {
          if (!task.scheduledTime) { const calendarUrl = new URL('https://www.google.com/calendar/render'); calendarUrl.searchParams.append('action', 'TEMPLATE'); calendarUrl.searchParams.append('text', task.text); window.open(calendarUrl.toString(), '_blank', 'noopener,noreferrer'); return; }
          const [hours, minutes] = task.scheduledTime.split(':').map(Number);
          const startTime = new Date(); startTime.setHours(hours, minutes, 0, 0);
          const endTime = new Date(startTime.getTime() + (task.duration || 60) * 60 * 1000);
          const toGoogleFormat = (date) => date.toISOString().replace(/-|:|\.\d{3}/g, '');
          const calendarUrl = new URL('https://www.google.com/calendar/render');
          calendarUrl.searchParams.append('action', 'TEMPLATE');
          calendarUrl.searchParams.append('text', task.text);
          calendarUrl.searchParams.append('dates', `${toGoogleFormat(startTime)}/${toGoogleFormat(endTime)}`);
          calendarUrl.searchParams.append('details', task.notes || `Completing task: ${task.text}`);
          window.open(calendarUrl.toString(), '_blank', 'noopener,noreferrer');
        };

        return (
          <div className="p-4 rounded-lg transition-all bg-white border border-slate-200">
            <div className="flex items-start gap-4">
              <input type="checkbox" checked={task.isCompleted} onChange={(e) => handleToggle('isCompleted', e.target.checked)} className="mt-1 h-5 w-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500" />
              <div className="flex-1">
                <div className="flex items-start gap-2">
                  {isEditingTitle ? (<input type="text" value={tempTitle} onChange={(e) => setTempTitle(e.target.value)} onBlur={handleTitleEdit} onKeyDown={(e) => { if (e.key === 'Enter') handleTitleEdit(); if (e.key === 'Escape') { setTempTitle(task.text); setIsEditingTitle(false); }}} className="flex-1 font-medium text-slate-800 bg-transparent border-b-2 border-blue-500 focus:outline-none" autoFocus />) : (<p className="flex-1 font-medium text-slate-800">{task.text}</p>)}
                  <button onClick={handleTitleEdit} className="p-1 text-slate-400 hover:text-slate-600"><EditIcon className="w-4 h-4" /></button>
                </div>
                <div className="mt-2">
                  <div className="flex items-center gap-2">
                    <button onClick={() => setShowDescription(!showDescription)} className="text-sm text-slate-500 hover:text-slate-700 flex items-center gap-1">
                      <ChevronDownIcon className={`w-4 h-4 transform transition-transform ${showDescription ? 'rotate-180' : ''}`} />Description {task.description ? '(has content)' : '(empty)'}
                    </button>
                    <button onClick={handleDescriptionEdit} className="p-1 text-slate-400 hover:text-slate-600"><EditIcon className="w-3 h-3" /></button>
                  </div>
                  {showDescription && (
                    <div className="mt-2">
                      {isEditingDescription ? (
                        <div className="space-y-2">
                          <textarea value={tempDescription} onChange={(e) => setTempDescription(e.target.value)} placeholder="Add a description..." className="w-full text-sm p-2 rounded-md border-slate-300 focus:ring-blue-500 focus:border-blue-500" rows={3} autoFocus />
                          <div className="flex gap-2">
                            <button onClick={handleDescriptionEdit} className="px-3 py-1 text-sm bg-blue-500 text-white rounded-md hover:bg-blue-600">Save</button>
                            <button onClick={() => { setTempDescription(task.description || ''); setIsEditingDescription(false); }} className="px-3 py-1 text-sm bg-slate-200 text-slate-700 rounded-md hover:bg-slate-300">Cancel</button>
                          </div>
                        </div>
                      ) : (<div className="text-sm text-slate-600 bg-slate-50 p-2 rounded-md">{task.description || <em className="text-slate-400">No description yet.</em>}</div>)}
                    </div>
                  )}
                </div>
              </div>
            </div>
            {isTopThree && (
              <div className="mt-3 space-y-3">
                <div className="grid grid-cols-2 gap-2">
                  <TimePicker12Hour value={task.scheduledTime || ''} onChange={(time) => handleToggle('scheduledTime', time)} className="w-full" />
                  <select value={task.duration || 60} onChange={(e) => handleToggle('duration', Number(e.target.value))} className="block w-full text-sm p-2 rounded-md border-slate-300 focus:ring-blue-500 focus:border-blue-500">
                    <option value="15">15 mins</option><option value="30">30 mins</option><option value="45">45 mins</option><option value="60">1 hour</option><option value="90">1.5 hours</option><option value="120">2 hours</option>
                  </select>
                </div>
                <button onClick={handleAddToCalendar} className="w-full flex items-center justify-center gap-2 p-2 rounded-md bg-white border border-slate-300 text-slate-600 hover:bg-slate-50 hover:text-blue-600">
                  <CalendarIcon className="w-5 h-5" /><span>{task.scheduledTime ? 'Add to Calendar' : 'Open Calendar'}</span>
                </button>
                <div><label className="block text-sm font-medium text-slate-600 mb-1">Action Points & Notes</label><textarea placeholder="Specific action steps..." value={task.notes || ''} onChange={(e) => handleToggle('notes', e.target.value)} rows={3} className="block w-full text-sm p-2 rounded-md border-slate-300 focus:ring-blue-500 focus:border-blue-500" /></div>
                <button onClick={() => handleToggle('isIncomeGenerating', !task.isIncomeGenerating)} className={`w-full flex items-center justify-center gap-2 px-3 py-2 text-sm rounded-md transition-colors ${task.isIncomeGenerating ? 'bg-yellow-400 text-yellow-900 hover:bg-yellow-500' : 'bg-slate-200 text-slate-600 hover:bg-slate-300'}`}>
                  <DollarSignIcon className="w-4 h-4" /><span>Income-Generating Activity</span>
                </button>
              </div>
            )}
            {(onPromote || onDemote || onSendToVault || onLaunchGemini || onDelete) && (
              <div className="mt-3 pt-3 border-t border-slate-200 flex items-center justify-between">
                <div className="flex items-center gap-2">
                  {onPromote && <button onClick={onPromote} className="flex items-center gap-1 px-2 py-1 text-xs font-medium text-green-700 bg-green-50 rounded-md hover:bg-green-100"><ArrowUpCircleIcon className="w-4 h-4" /><span>Promote</span></button>}
                  {onDemote && <button onClick={onDemote} className="flex items-center gap-1 px-2 py-1 text-xs font-medium text-yellow-700 bg-yellow-50 rounded-md hover:bg-yellow-100"><ArrowDownCircleIcon className="w-4 h-4" /><span>Demote</span></button>}
                  {onSendToVault && <button onClick={onSendToVault} className="flex items-center gap-1 px-2 py-1 text-xs font-medium text-purple-700 bg-purple-50 rounded-md hover:bg-purple-100"><LightbulbIcon className="w-4 h-4" /><span>To Vault</span></button>}
                  {onLaunchGemini && <button onClick={onLaunchGemini} className="flex items-center gap-1 px-2 py-1 text-xs font-medium text-blue-700 bg-blue-50 rounded-md hover:bg-blue-100"><SparkleIcon className="w-4 h-4" /><span>AI Help</span></button>}
                </div>
                <button onClick={onDelete} className="flex items-center gap-1 px-2 py-1 text-xs font-medium text-red-700 bg-red-50 rounded-md hover:bg-red-100"><TrashIcon className="w-4 h-4" /><span>Delete</span></button>
              </div>
            )}
          </div>
        );
      };

      // ‚îÄ‚îÄ‚îÄ NON-NEGOTIABLE TASKS ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      const NonNegotiableTasks = ({ tasks, onUpdateTask }) => {
        return (
          <div className="space-y-4">
            {tasks.map(task => (
              <div key={task.id} className="p-4 rounded-lg bg-slate-50 border border-slate-200">
                <div className="flex items-center gap-4">
                  <input type="checkbox" checked={task.isCompleted} onChange={(e) => onUpdateTask({ ...task, isCompleted: e.target.checked })} className="h-5 w-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500 shrink-0" />
                  <p className="flex-1 font-medium text-slate-800">{task.text}</p>
                  <TimePicker12Hour value={task.scheduledTime || ''} onChange={(time) => onUpdateTask({ ...task, scheduledTime: time })} className="flex-shrink-0" />
                </div>
              </div>
            ))}
          </div>
        );
      };

      // ‚îÄ‚îÄ‚îÄ IDEAS VAULT LIST ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      const IdeasVaultList = ({ ideas, onUpdateIdea, onReorderIdea, onCopyFromVault, onDeleteIdea }) => (
        <div className="space-y-4">
          {ideas.map((idea, index) => (
            <div key={idea.id} className="p-4 bg-slate-50 rounded-lg border border-slate-200">
              <div className="flex items-center justify-between gap-3">
                <p className="flex-1 font-medium text-slate-700">{idea.text}</p>
                <div className="flex items-center gap-2">
                  <button onClick={() => onReorderIdea(idea.id, 'up')} disabled={index === 0} className="p-1 rounded-md text-slate-500 hover:bg-slate-200 disabled:opacity-30"><ChevronUpIcon className="w-5 h-5" /></button>
                  <button onClick={() => onReorderIdea(idea.id, 'down')} disabled={index === ideas.length - 1} className="p-1 rounded-md text-slate-500 hover:bg-slate-200 disabled:opacity-30"><ChevronDownIcon className="w-5 h-5" /></button>
                  <div className="h-6 border-l border-slate-300"></div>
                  <button onClick={() => onCopyFromVault(idea.id)} className="flex items-center gap-1 px-2 py-1 text-xs font-medium text-blue-700 bg-blue-50 rounded-md hover:bg-blue-100"><RestoreIcon className="w-4 h-4" /><span>To Brain Dump</span></button>
                  <button onClick={() => onDeleteIdea(idea.id)} className="p-1 text-red-600 hover:text-red-800"><TrashIcon className="w-5 h-5" /></button>
                </div>
              </div>
            </div>
          ))}
        </div>
      );

      // ‚îÄ‚îÄ‚îÄ MAIN APP ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      const NON_NEGOTIABLE_TASKS_BASE = [
        { id: 'nn-prospecting', text: 'Prospecting Min 1 hr', isIncomeGenerating: true, duration: 60 },
        { id: 'nn-linkedin', text: 'Linkedin Post and commenting Min 1 hr', isIncomeGenerating: false, duration: 60 },
      ];

      const App = () => {
        const todayStr = new Date().toISOString().split('T')[0];
        const [brainDump, setBrainDump] = useLocalStorage('timeboxing-brainDump', []);
        const [topThree, setTopThree] = useLocalStorage(`timeboxing-topThree_${todayStr}`, []);
        const [completedHistory, setCompletedHistory] = useLocalStorage('timeboxing-completedHistory', []);
        const [ideasVault, setIdeasVault] = useLocalStorage('timeboxing-ideasVault', []);
        const [lapsHistory, setLapsHistory] = useLocalStorage('lapsHistory', []);
        const [accountabilityHistory, setAccountabilityHistory] = useLocalStorage('accountability-history', []);
        const [nonNegotiableTasks, setNonNegotiableTasks] = useLocalStorage(`timeboxing-nonNegotiable_${todayStr}`, NON_NEGOTIABLE_TASKS_BASE.map(task => ({ ...task, isCompleted: false, scheduledTime: '', notes: '', description: '' })));
        const [newTaskText, setNewTaskText] = useState('');
        const [showCompleted, setShowCompleted] = useState(false);
        const [showIdeasVault, setShowIdeasVault] = useState(false);
        const [showReports, setShowReports] = useState(false);
        const [geminiTask, setGeminiTask] = useState(null);

        // ‚îÄ‚îÄ‚îÄ Brain Dump Import / Export ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
        const [isSelectMode, setIsSelectMode] = useState(false);
        const [selectedBrainDumpIds, setSelectedBrainDumpIds] = useState(new Set());
        const importFileRef = useRef(null);

        const escapeCsvField = (field) => {
          if (/[",\n\r]/.test(field)) return `"${field.replace(/"/g, '""')}"`;
          return field;
        };
        const parseCSV = (text) => {
          const rows = [];
          for (const line of text.split(/\r?\n/)) {
            if (!line.trim()) continue;
            const fields = []; let current = ''; let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
              const ch = line[i];
              if (ch === '"') { if (inQuotes && line[i+1] === '"') { current += '"'; i++; } else inQuotes = !inQuotes; }
              else if (ch === ',' && !inQuotes) { fields.push(current); current = ''; }
              else current += ch;
            }
            fields.push(current); rows.push(fields);
          }
          return rows;
        };
        const handleToggleSelectMode = () => { setIsSelectMode(v => !v); setSelectedBrainDumpIds(new Set()); };
        const handleToggleSelectId = (id) => {
          setSelectedBrainDumpIds(prev => { const next = new Set(prev); if (next.has(id)) next.delete(id); else next.add(id); return next; });
        };
        const handleSelectAll = () => {
          if (selectedBrainDumpIds.size === brainDump.length) setSelectedBrainDumpIds(new Set());
          else setSelectedBrainDumpIds(new Set(brainDump.map(t => t.id)));
        };
        const handleExportCSV = () => {
          const tasks = selectedBrainDumpIds.size > 0 ? brainDump.filter(t => selectedBrainDumpIds.has(t.id)) : brainDump;
          const headers = ['Task Name','Notes','Scheduled Time (HH:MM)','Duration (mins)','Income Generating (true/false)'];
          const rows = tasks.map(t => [escapeCsvField(t.text||''),escapeCsvField(t.notes||''),escapeCsvField(t.scheduledTime||''),String(t.duration||''),String(t.isIncomeGenerating)].join(','));
          downloadCSV([headers.join(','),...rows].join('\n'), `brain-dump-${new Date().toISOString().split('T')[0]}.csv`);
        };
        const handleExportTXT = () => {
          const tasks = selectedBrainDumpIds.size > 0 ? brainDump.filter(t => selectedBrainDumpIds.has(t.id)) : brainDump;
          const txt = tasks.map((t,i) => { let l=`${i+1}. ${t.text}`; if(t.notes) l+=`\n   Notes: ${t.notes}`; if(t.scheduledTime) l+=`\n   Time: ${t.scheduledTime}`; if(t.duration) l+=`\n   Duration: ${t.duration} mins`; if(t.isIncomeGenerating) l+=`\n   [Income Generating]`; return l; }).join('\n\n');
          const blob = new Blob([txt],{type:'text/plain'}); const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`brain-dump-${new Date().toISOString().split('T')[0]}.txt`; a.click();
        };
        const handleDownloadTemplate = () => {
          const headers = ['Task Name','Notes','Scheduled Time (HH:MM)','Duration (mins)','Income Generating (true/false)'];
          downloadCSV([headers.join(','),'Example Task 1,Some action points here,09:00,60,false','Example Task 2,Follow up with client,14:00,30,true'].join('\n'), 'brain-dump-template.csv');
        };
        const handleImportCSV = (e) => {
          const file = e.target.files && e.target.files[0]; if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            const rows = parseCSV(ev.target.result);
            if (rows.length < 2) { alert('CSV appears empty or only has headers.'); return; }
            const header = rows[0].map(h => h.trim().toLowerCase());
            const nameIdx=header.findIndex(h=>h.includes('task')), notesIdx=header.findIndex(h=>h.includes('notes')), timeIdx=header.findIndex(h=>h.includes('time')), durationIdx=header.findIndex(h=>h.includes('duration')), incomeIdx=header.findIndex(h=>h.includes('income'));
            const newTasks = rows.slice(1).filter(row=>nameIdx>=0&&row[nameIdx]&&row[nameIdx].trim()).map(row=>({ id:generateUUID(), text:row[nameIdx].trim(), notes:notesIdx>=0?(row[notesIdx]||'').trim():'', scheduledTime:timeIdx>=0?(row[timeIdx]||'').trim():'', duration:durationIdx>=0?(parseInt(row[durationIdx])||60):60, isIncomeGenerating:incomeIdx>=0?(row[incomeIdx]||'').trim().toLowerCase()==='true':false, isCompleted:false }));
            if (newTasks.length===0) { alert('No valid tasks found. Make sure your CSV has a "Task Name" column.'); return; }
            setBrainDump(prev=>[...newTasks,...prev]);
            alert(`Imported ${newTasks.length} task${newTasks.length===1?'':'s'} into your Brain Dump.`);
          };
          reader.readAsText(file); e.target.value='';
        };

        const handleAddTask = (e) => {
          e.preventDefault();
          if (newTaskText.trim() === '') return;
          const newTask = { id: generateUUID(), text: newTaskText, isCompleted: false, isIncomeGenerating: false, notes: '', description: '', scheduledTime: '', duration: 60 };
          setBrainDump(prev => [newTask, ...prev]);
          setNewTaskText('');
          // ‚îÄ‚îÄ‚îÄ WEBHOOK: Task Added ‚îÄ‚îÄ‚îÄ
          fireWebhook(WEBHOOK_TASK_EVENTS, {
            event: 'task_added',
            date_added: new Date().toISOString(),
            task_id: newTask.id,
            task_text: newTask.text,
            description: '',
            section: 'Brain Dump',
            status: 'Active',
            income_generating: false,
            scheduled_time: '',
            duration_mins: 60,
            action_notes: '',
            is_completed: false,
            completed_at: '',
            moved_to_vault: false,
            week_number: getWeekNumber(new Date()),
            month: new Date().toLocaleString('default', { month: 'long' }),
            year: new Date().getFullYear()
          });
        };

        const handleUpdateTask = useCallback((updatedTask) => {
          if (updatedTask.isCompleted) {
            const taskToArchive = { ...updatedTask, completedAt: new Date().toISOString() };
            setCompletedHistory(prev => [taskToArchive, ...prev]);
            setBrainDump(prev => prev.filter(t => t.id !== updatedTask.id));
            setTopThree(prev => prev.filter(t => t.id !== updatedTask.id));
            // ‚îÄ‚îÄ‚îÄ WEBHOOK: Task Completed ‚îÄ‚îÄ‚îÄ
            fireWebhook(WEBHOOK_TASK_EVENTS, {
              event: 'task_completed',
              date_added: new Date().toISOString(),
              task_id: updatedTask.id,
              task_text: updatedTask.text,
              description: updatedTask.description || '',
              section: topThree.find(t => t.id === updatedTask.id) ? 'Top 3' : 'Brain Dump',
              status: 'Completed',
              income_generating: updatedTask.isIncomeGenerating || false,
              scheduled_time: updatedTask.scheduledTime || '',
              duration_mins: updatedTask.duration || 60,
              action_notes: updatedTask.notes || '',
              is_completed: true,
              completed_at: new Date().toISOString(),
              moved_to_vault: false,
              week_number: getWeekNumber(new Date()),
              month: new Date().toLocaleString('default', { month: 'long' }),
              year: new Date().getFullYear()
            });
          } else {
            setBrainDump(prev => prev.map(t => t.id === updatedTask.id ? updatedTask : t));
            setTopThree(prev => prev.map(t => t.id === updatedTask.id ? updatedTask : t));
          }
        }, [setBrainDump, setTopThree, setCompletedHistory, topThree]);

        const handleUpdateNonNegotiableTask = useCallback((updatedTask) => {
          setNonNegotiableTasks(prev => prev.map(t => t.id === updatedTask.id ? updatedTask : t));
        }, [setNonNegotiableTasks]);

        const handleDeleteTask = (id, listSetter) => {
          if (window.confirm("Are you sure you want to permanently delete this item?")) listSetter(prev => prev.filter(t => t.id !== id));
        };

        const promoteTask = (id) => {
          if (topThree.length >= 3) { alert("You can only have 3 top tasks. Demote one first."); return; }
          const taskToPromote = brainDump.find(t => t.id === id);
          if (taskToPromote) { setTopThree(prev => [...prev, taskToPromote]); setBrainDump(prev => prev.filter(t => t.id !== id)); }
        };

        const demoteTask = (id) => {
          const taskToDemote = topThree.find(t => t.id === id);
          if (taskToDemote) { setBrainDump(prev => [taskToDemote, ...prev]); setTopThree(prev => prev.filter(t => t.id !== id)); }
        };

        const restoreTask = (id) => {
          const taskToRestore = completedHistory.find(t => t.id === id);
          if (taskToRestore) { setBrainDump(prev => [{ ...taskToRestore, isCompleted: false, completedAt: undefined }, ...prev]); setCompletedHistory(prev => prev.filter(t => t.id !== id)); }
        };

        const handleSendToVault = (id) => {
          const taskToVault = brainDump.find(t => t.id === id);
          if (taskToVault) {
            setIdeasVault(prev => [{ id: taskToVault.id, text: taskToVault.text, description: taskToVault.description || '' }, ...prev]);
            setBrainDump(prev => prev.filter(t => t.id !== id));
            // ‚îÄ‚îÄ‚îÄ WEBHOOK: Task Vaulted ‚îÄ‚îÄ‚îÄ
            fireWebhook(WEBHOOK_TASK_EVENTS, {
              event: 'task_vaulted',
              date_added: new Date().toISOString(),
              task_id: taskToVault.id,
              task_text: taskToVault.text,
              description: taskToVault.description || '',
              section: 'Ideas Vault',
              status: 'Vaulted',
              income_generating: false,
              scheduled_time: '',
              duration_mins: '',
              action_notes: '',
              is_completed: false,
              completed_at: '',
              moved_to_vault: true,
              week_number: getWeekNumber(new Date()),
              month: new Date().toLocaleString('default', { month: 'long' }),
              year: new Date().getFullYear()
            });
          }
        };

        const handleCopyFromVault = (id) => {
          const taskToCopy = ideasVault.find(t => t.id === id);
          if (taskToCopy) { setBrainDump(prev => [{ ...taskToCopy, id: generateUUID(), isCompleted: false, isIncomeGenerating: false, notes: '', scheduledTime: '', duration: 60 }, ...prev]); alert(`‚úÖ Copied "${taskToCopy.text}" to Brain Dump!`); }
        };

        const handleReorderIdea = (id, direction) => {
          setIdeasVault(prev => {
            const index = prev.findIndex(t => t.id === id);
            if (index === -1) return prev;
            const newVault = [...prev];
            if (direction === 'up' && index > 0) [newVault[index - 1], newVault[index]] = [newVault[index], newVault[index - 1]];
            if (direction === 'down' && index < prev.length - 1) [newVault[index + 1], newVault[index]] = [newVault[index], newVault[index + 1]];
            return newVault;
          });
        };

        const startNewDay = () => {
          if (window.confirm("End the day? Incomplete priorities will return to Brain Dump.")) {
            const incompleteTasks = topThree.filter(t => !t.isCompleted);
            if (incompleteTasks.length > 0) setBrainDump(prev => [...incompleteTasks.map(t => ({ ...t, scheduledTime: '', notes: '', isIncomeGenerating: false })), ...prev]);
            setTopThree([]);
            setTimeout(() => window.location.reload(), 100);
          }
        };

        const dayOfWeek = new Date().getDay();
        const isWeekday = dayOfWeek > 0 && dayOfWeek < 6;

        return (
          <div className="min-h-screen bg-slate-100">
            <header className="bg-white shadow-sm sticky top-0 z-20">
              <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
                <h1 className="text-2xl font-bold text-slate-800">Momentum Tracker</h1>
                <div className="flex items-center gap-3">
                  <button onClick={() => exportUncompletedTasks(brainDump, topThree, nonNegotiableTasks, ideasVault)} className="flex items-center gap-2 px-4 py-2 text-sm font-medium text-green-600 bg-green-50 rounded-md hover:bg-green-100"><DownloadIcon className="w-4 h-4" />Export Uncompleted</button>
                  <button onClick={() => exportAllData(lapsHistory, accountabilityHistory, completedHistory, brainDump, topThree, ideasVault)} className="flex items-center gap-2 px-4 py-2 text-sm font-medium text-blue-600 bg-blue-50 rounded-md hover:bg-blue-100"><DownloadIcon className="w-4 h-4" />Export All Data</button>
                  <button onClick={startNewDay} className="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-md hover:bg-red-700">Start New Day</button>
                </div>
              </div>
            </header>
            <main className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
              <Instructions />

              <section className="bg-white p-6 rounded-lg shadow-md mb-8">
                <h2 className="text-2xl font-bold text-slate-800 mb-4">‚≠ê Top 3 Priorities</h2>
                <div className="space-y-4">
                  {topThree.map(task => (<TaskCard key={task.id} task={task} onUpdate={handleUpdateTask} onDelete={() => handleDeleteTask(task.id, setTopThree)} onDemote={() => demoteTask(task.id)} onLaunchGemini={() => setGeminiTask(task)} isTopThree={true} />))}
                  {topThree.length < 3 && Array.from({ length: 3 - topThree.length }).map((_, i) => (<div key={i} className="p-4 rounded-lg border-2 border-dashed border-slate-300 text-center text-slate-400">Empty Priority Slot</div>))}
                </div>
              </section>

              {isWeekday && (
                <section className="bg-white p-6 rounded-lg shadow-md mb-8">
                  <h2 className="text-2xl font-bold text-slate-800 mb-4">üóìÔ∏è Daily Non-Negotiables</h2>
                  <NonNegotiableTasks tasks={nonNegotiableTasks} onUpdateTask={handleUpdateNonNegotiableTask} />
                </section>
              )}

              <div className="bg-slate-100 border-l-4 border-blue-400 p-4 rounded-lg shadow-sm mb-6">
                <h3 className="text-sm font-semibold text-blue-800">Daily Accountability Reminder</h3>
                <ul className="list-disc list-inside space-y-1 ml-2 mt-2 text-sm text-blue-700">
                  <li><strong>Make at least 1 Appointment</strong></li>
                  <li><strong>Speak to at least 1 person</strong></li>
                  <li><strong>Teach Someone</strong></li>
                  <li><strong>Make an offer</strong></li>
                </ul>
              </div>

              <section className="bg-white p-6 rounded-lg shadow-md mb-8">
                <div className="flex items-center justify-between mb-4 gap-2 flex-wrap">
                  <h2 className="text-2xl font-bold text-slate-800">üß† Brain Dump</h2>
                  <div className="flex items-center gap-2 flex-wrap">
                    {!isSelectMode ? (<>
                      <button onClick={() => importFileRef.current && importFileRef.current.click()} className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-md bg-slate-100 text-slate-600 hover:bg-slate-200"><UploadIcon className="w-3.5 h-3.5" /> Import</button>
                      <button onClick={handleDownloadTemplate} className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-md bg-slate-100 text-slate-600 hover:bg-slate-200"><DownloadIcon className="w-3.5 h-3.5" /> Template</button>
                      {brainDump.length > 0 && <button onClick={handleToggleSelectMode} className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-md bg-blue-50 text-blue-600 hover:bg-blue-100">Export</button>}
                    </>) : (<>
                      <label className="flex items-center gap-1.5 text-xs text-slate-600 cursor-pointer select-none"><input type="checkbox" checked={brainDump.length > 0 && selectedBrainDumpIds.size === brainDump.length} onChange={handleSelectAll} className="h-4 w-4 rounded border-gray-300 text-blue-600" /> All</label>
                      <span className="text-xs text-slate-500">{selectedBrainDumpIds.size} selected</span>
                      <button onClick={handleExportCSV} disabled={selectedBrainDumpIds.size === 0} className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-md bg-green-50 text-green-700 hover:bg-green-100 disabled:opacity-40 disabled:cursor-not-allowed"><DownloadIcon className="w-3.5 h-3.5" /> CSV</button>
                      <button onClick={handleExportTXT} disabled={selectedBrainDumpIds.size === 0} className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-md bg-green-50 text-green-700 hover:bg-green-100 disabled:opacity-40 disabled:cursor-not-allowed"><DownloadIcon className="w-3.5 h-3.5" /> TXT</button>
                      <button onClick={handleToggleSelectMode} className="px-3 py-1.5 text-xs font-medium rounded-md bg-slate-100 text-slate-600 hover:bg-slate-200">Cancel</button>
                    </>)}
                    <input type="file" ref={importFileRef} onChange={handleImportCSV} accept=".csv" className="hidden" aria-hidden="true" />
                  </div>
                </div>
                <div className="bg-gradient-to-r from-green-50 to-emerald-50 border border-green-200 rounded-lg p-4 mb-6 shadow-sm">
                  <form onSubmit={handleAddTask} className="flex gap-3">
                    <input type="text" value={newTaskText} onChange={(e) => setNewTaskText(e.target.value)} placeholder="Type your task here and press Enter..." className="flex-grow block w-full rounded-lg border-green-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm p-3 bg-white" autoFocus />
                    <button type="submit" className="bg-green-600 text-white px-4 py-3 rounded-lg hover:bg-green-700 flex items-center"><PlusIcon className="w-5 h-5" /><span className="ml-2 font-medium">Add</span></button>
                  </form>
                </div>
                <div className="space-y-3 max-h-[45rem] overflow-y-auto pr-2">
                  {brainDump.length > 0 ? brainDump.map(task => (
                    <div key={task.id} className="flex items-start gap-2">
