                      {isSelectMode && <input type="checkbox" checked={selectedBrainDumpIds.has(task.id)} onChange={() => handleToggleSelectId(task.id)} className="mt-4 h-5 w-5 rounded border-gray-300 text-blue-600 flex-shrink-0 cursor-pointer" />}
                      <div className="flex-1 min-w-0"><TaskCard task={task} onUpdate={handleUpdateTask} onDelete={() => handleDeleteTask(task.id, setBrainDump)} onPromote={() => promoteTask(task.id)} onSendToVault={() => handleSendToVault(task.id)} onLaunchGemini={() => setGeminiTask(task)} isTopThree={false} /></div>
                    </div>
                  )) : (<p className="text-slate-500 text-center py-4">Brain dump all your tasks for the day here.</p>)}
                </div>
              </section>

              <div className="bg-white p-6 rounded-lg shadow-md mb-8">
                <button onClick={() => setShowIdeasVault(!showIdeasVault)} className="w-full flex justify-between items-center text-left text-xl font-bold text-slate-800 focus:outline-none">
                  <span>üí° Ideas Vault ({ideasVault.length})</span><ChevronDownIcon className={`w-6 h-6 transform transition-transform ${showIdeasVault ? 'rotate-180' : ''}`} />
                </button>
                {showIdeasVault && (<div className="mt-4 pt-4 border-t">{ideasVault.length > 0 ? <IdeasVaultList ideas={ideasVault} onUpdateIdea={(u) => setIdeasVault(prev => prev.map(i => i.id === u.id ? u : i))} onReorderIdea={handleReorderIdea} onCopyFromVault={handleCopyFromVault} onDeleteIdea={(id) => handleDeleteTask(id, setIdeasVault)} /> : <p className="text-slate-500 text-center py-4">Send ideas here to review later.</p>}</div>)}
              </div>

              <div className="bg-white p-6 rounded-lg shadow-md mb-8">
                <div className="flex justify-between items-center">
                  <button onClick={() => setShowCompleted(!showCompleted)} className="flex items-center text-left text-xl font-bold text-slate-800 focus:outline-none">
                    <span>‚úÖ Completed Task History ({completedHistory.length})</span><ChevronDownIcon className={`w-6 h-6 ml-2 transform transition-transform ${showCompleted ? 'rotate-180' : ''}`} />
                  </button>
                  {completedHistory.length > 0 && <button onClick={() => exportCompletedTasks(completedHistory)} className="flex items-center gap-2 px-3 py-1 text-sm font-medium text-blue-600 bg-blue-50 rounded-md hover:bg-blue-100"><DownloadIcon className="w-4 h-4" />Export CSV</button>}
                </div>
                {showCompleted && completedHistory.length > 0 && (
                  <div className="mt-4 space-y-2">
                    {completedHistory.slice(0, 10).map(task => (
                      <div key={task.id} className="flex items-center justify-between p-3 bg-slate-50 rounded-lg">
                        <div><p className="font-medium text-slate-900">{task.text}</p><p className="text-sm text-slate-500">{new Date(task.completedAt).toLocaleString()}</p></div>
                        <div className="flex items-center gap-2">
                          <button onClick={() => restoreTask(task.id)} className="text-blue-600 hover:text-blue-800"><RestoreIcon className="w-4 h-4" /></button>
                          <button onClick={() => handleDeleteTask(task.id, setCompletedHistory)} className="text-red-600 hover:text-red-800"><TrashIcon className="w-4 h-4" /></button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              <div className="mb-8"><LapsTracker lapsHistory={lapsHistory} setLapsHistory={setLapsHistory} /></div>
              <div className="mb-8"><AccountabilityTracker accountabilityHistory={accountabilityHistory} setAccountabilityHistory={setAccountabilityHistory} /></div>

              <div className="bg-white p-6 rounded-lg shadow-md">
                <button onClick={() => setShowReports(!showReports)} className="w-full flex justify-between items-center text-left text-xl font-bold text-slate-800 focus:outline-none">
                  <span>üìà Performance Reports</span><ChevronDownIcon className={`w-6 h-6 transform transition-transform ${showReports ? 'rotate-180' : ''}`} />
                </button>
                {showReports && (<div className="mt-6 border-t pt-6"><Reports lapsHistory={lapsHistory} accountabilityHistory={accountabilityHistory} /></div>)}
              </div>
            </main>
            {geminiTask && <GeminiModal task={geminiTask} onClose={() => setGeminiTask(null)} />}
          </div>
        );
      };

      const rootElement = document.getElementById('root');
      if (rootElement) { const root = ReactDOM.createRoot(rootElement); root.render(<App />); }
    </script>
  </body>
</html>
